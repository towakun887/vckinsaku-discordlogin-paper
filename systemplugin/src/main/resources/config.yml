api:
  # botとの通信用HTTPサーバーのport
  port: 25580
  # 通信認証用のAPIキー。botの.envと同じであればなんでもいい
  key: "your-shared-api-key-here"

database:
  file: "kinsaku.db"

crossplay:
  bedrock-prefix: "."
  use-floodgate: true

messages:
  whitelist-kick: "あなたはホワイトリストに登録されていません。Discordの /server-whitelist-add コマンドから登録してください。"
